const SEEDED_ENTRIES = {
  'page-zero': [
    {title:'The Instrument Before the Event', body:`Most historical origin stories begin with an external event. This one begins with a physical body. I was born with my eyes built unevenly—one eye focused further than the other, one tilted toward the far horizon, one focused on the near immediate space. The clinical terminology for this asymmetry is small, reductive, and wrong: they called it a lazy eye. Nothing about what that physiological asymmetry built was lazy.

A brain handed two cameras that fundamentally refuse to agree on a single stereo image must make a profound cognitive decision early in development. My brain chose not to spend my life forcing a standard stereo projection out of a mismatched optical signal. Instead, it constructed an entirely alternative method of perceiving depth: navigating out of motion, out of dense texture, and out of the felt flow of energetic systems moving past each other.

The structural consequence: I do not move through space the way most people do. I do not navigate by a fixed, confident, two-dimensional prediction of what sits directly in front of me. I navigate entirely by feel—a continuous, 360-degree spatial awareness of the energy of a room.

This physical preparation was essential before the dissolution occurred. The ground was already prepared. The soul was already, in the most literal and mechanical sense, psyched—built and structurally oriented before it had any conscious idea of what it was built to receive.`, tags:['origin','biology','perception']},
    {title:'The White Light Dissolution', body:`In casual language, it is often termed a "bad trip." That phrase is fundamentally incorrect. Not because the experience was comfortable—it was absolute psychic terror long before it surrendered to absolute peace—but because the word bad implies a functional failure, a mechanical error, a systemic glitch that should have been avoided.

Nothing malfunctioned. The compound did exactly what it instructs the human biological machine to do: it took the structural self apart. A profound psychedelic experience completely dismantled the ego architecture I had spent my entire life mistaking for my identity. It did not loosen it; it did not gently soften the edges; it entirely dismantled it.

The narrative voice that runs continuously behind the eyes—the linguistic engine that states "this is happening to me, I am the singular entity it is happening to"—simply ceased to function. And when that voice stopped, the specific "me" it had been narrating dissolved instantly with it.

What remained when the localized self was completely gone was light. Absolute white light. Source. It was not an external light that shone upon an object; it was the light out of which objects themselves are rendered.

This is the event. Everything within this brand, this line, and this Codex is downstream from this exact unmaking.`, tags:['dissolution','ego-death','source']}
  ],
  'chronology': [
    {title:'Phase I — The Preparation (2010–2018)', body:`Before Everything — The Biological Alignment: Born with mismatched optical focus, building a localized, 360-degree spatial depth perception based entirely on motion and energy.

2010 — The Laboratory Opens: Encountering the core thesis of manifestation via The Secret. It is not consumed as casual novelty but immediately adopted as a strict, daily experimental practice.

2018 — The Arrival of the Word: Russ uses the word "luxuries" in an acoustic track. Your mind isolates and claims it. It is perceived as a structural law of abundance. The social handle shifts from @psychedleo to Psyched Luxuries.`, tags:['phase-i','preparation']},
    {title:'Phase II — The Crucible (2019–2022)', body:`April 2019 — The Archive Ledger Commences: Formal record-keeping of your visual output begins. The hand had been moving in notebooks for a decade, but this marks the opening of the physical tracking ledger.

Circa 2020 — The Dissolution & First Run: Under global isolation, a profound psychedelic ego death takes place. Identity dissolves into an undivided field of absolute white light. Later in 2020, an LLC is registered, a Shopify storefront is built, and the brand enters the physical market.

2021 — The 41 Roles & Receipts: Trapped inside an exhausting paradox, managing all 41 distinct corporate roles alone. Visual Art Credits are secured on Apple Music for P-FILTHY. The Will Haynes relationship ignites.

Mid-2022 — The Mechanical Rupture: An intense physical altercation with a girlfriend. The intense pressure is transmuted into mark-making. You draw a highly private, dark visual vocabulary placed immediately into a locked physical safe.`, tags:['phase-ii','crucible']},
    {title:'Phase III — The Silent Reconstruction (2023–2025)', body:`2023 — The Tactical Dismantling: The initial external infrastructure—the Shopify store and outward marketing—is completely taken down. To an outside observer, this looks like failure. In reality, it is a deliberate, highly tactical retreat.

2024 — The Generation of Density: Freed from the pressure of satisfying a commercial algorithm, your hand moves with pure biological speed in absolute isolation. The Chaos Forms fully mature.

2025 — The Crystallization: The visual language solidifies into an absolute, locked structural lexicon. The Master Ledger is engineered as a proof-to-self. The Brain-Heart-Hands Logo is drawn, and the core operational glyphs are permanently locked.`, tags:['phase-iii','reconstruction']},
    {title:'Phase IV — The Reignition (2026)', body:`Early 2026 — The First Witness: A genuine friend named Aaron looks at an unmarketed raw seed of art and states: "I want that on a shirt." Aaron pays a premium founder's price. Your response to him sets the modern era in motion: Bet. Watch this.

March 30, 2026 — The Codex: The formal establishment of The Codex: Volume One. The three immutable laws are set in concrete. The reignition begins.`, tags:['phase-iv','reignition']}
  ],
  'declaration': [
    {title:'The Three Laws', body:`The three laws of Psyched Luxuries are not vague suggestions. They are not motivational statements for social media. They are the immutable operational principles of a complete worldview. Every design decision. Every drop. Every piece of copy must trace back to these laws:

1. Prepared for luxury.
2. You are in control of your reality.
3. So get what you want. Like I'm doing.

This Codex is written in the same hand that makes the physical work. The font on the garments is this hand digitized. The hand is the author. The Codex is the author's law. Watch this.`, tags:['law','axiom','foundation']},
    {title:'The Deconstruction of the Grammar', body:`PSYCHED: Prepared for. Not excited for. Not hoping for. Not dreaming of. Prepared. The psyche—the soul, the mind, the entire interior world oriented toward what is inevitably coming. Already built for the arrival. Already constituted as the exact kind of person to whom the arrival makes sense.

LUXURIES: Plural. Abundant. Not one isolated, elevated thing but a continuous, unstoppable flow of elevated objects and realities. The grammar of the brand name is the very first argument the brand makes. Luxury is scarce. Luxuries are infinite. The plural is the philosophy before the philosophy is even explained.

Psyched Luxuries: The soul prepared for infinite abundance. That is not a corporate brand name. That is a position on reality.`, tags:['grammar','name','etymology']},
    {title:'The Opening Statement', body:`Date of Origin: March 30, 2026

This is the Codex of Psyched Luxuries. Not a standard corporate business plan. Not a mood board for creative direction. Not a vision statement written for investors, social media algorithms, or societal approval.

This is law.

It is written in the exact hand that made the work. Documented by the person who lived the philosophy before it possessed an external name. Recorded at the precise moment preparation met its first external public proof of concept.

Everything within these pages is true. None of it is aspirational in the conventional, diluted sense of the word. Aspiration implies a distance between where you currently stand and where you are going. These pages collapse that distance entirely. What is written here is already real; it is simply being pulled from the internal world into the external, physical domain. That is what manifestation actually means. Not wishing. Not hoping. Not waiting for permission from systems. Pulling.

I am Maurrice. I am Psyched Luxuries.`, tags:['declaration','identity']}
  ],
  'philosophy': [
    {title:'The Origin of the Belief', body:`In 2010, a book titled The Secret introduced a conceptual framework that most of the population either immediately dismissed or consumed as a passing novelty. I neither dismissed it nor consumed it as novelty. I practiced it. The central argument—that consciousness participates actively in the construction of reality, that belief possesses structural consequence in the physical world—was not something I evaluated purely intellectually. It was something I began testing immediately against the brutal conditions of my actual life.

That practice has been running continuously since 2010. By the time Psyched Luxuries exists as a documented brand with a foundational Codex, the philosophy has fifteen years of lived data behind it. Not theory. Not borrowed ideology. Fifteen years of intense personal laboratory work.`, tags:['origin','the-secret','practice']},
    {title:'The Mechanism — How It Actually Works', body:`Manifestation is not mysticism; it is applied psychology operating through four specific, cold mechanisms:

1. Identity Construction: You decide who you are before the evidence supports it. Not who you hope to eventually become. Who you already are. The prepared person. Identity precedes evidence. Evidence follows identity.

2. Selective Perception: Once identity is firmly constructed, the mind begins actively perceiving opportunities, connections, and resources consistent with that identity that were previously invisible.

3. Behavioral Alignment: Identity shapes behavior. The person who genuinely believes they are prepared for luxuries makes radically different decisions than the person who believes abundance is a luxury for other people.

4. Declaration as Commitment Device: Writing the philosophy down, building the brand around it, and wearing it publicly on heavy garments are cognitive commitment devices that make returning to the old, small identity psychologically costly.`, tags:['mechanism','psychology','identity']},
    {title:'The Brand as Living Proof', body:`Most brands sell a physical product. Some brands sell an aspirational lifestyle. Rare brands sell a belief system.

Psyched Luxuries does something a fourth and almost unprecedented thing: it is simultaneously the argument and the evidence for its own argument.

The brand's success is not the financial reward at the end of the philosophical journey; the brand's success is the philosophy proving itself in real time in public. The customers are not just buyers; they are witnesses to a proof of concept. And if they apply the same principles to their own lives and experience results, they become participants in the experiment. That is not a customer base; that is a congregation with receipts.`, tags:['proof','congregation','meta']}
  ],
  'origin': [
    {title:'The Beginning — Pattern Without Message', body:`It started as pattern. Not philosophy. Not a message. Not a deliberate attempt to make meaningful art. Pattern. Visual instinct leading. The hand moving because it needed to move.

The earliest documented work in the archive—Cityscape, Alien Abduction, Chalk on Wall—these are the raw works of a person discovering what their hand does when left entirely to its own devices. The archive begins April 2019, but the practice began long before the documentation did.`, tags:['beginning','pattern']},
    {title:'The Pivot — Pattern Became Language', body:`The pivot did not come from academic study or calm intention. It came from a fight. An intense physical altercation with a girlfriend. A moment of violence that could have collapsed inward into a wound and silence.

Instead, the psyche did what the greatest artists' psyches do under immense pressure: it transmuted the rupture into mark-making.

I walked away and drew. The drawings that came from that specific session went directly into a physical safe with a key that nobody else holds. Dark work. Private work. Work in the profound tradition of Dr. Seuss's private drawings. Those drawings have never been seen. They matter because they cracked open a channel in the psyche that had been partially sealed.`, tags:['pivot','rupture','safe']},
    {title:'The Mental Break — The Channel Deepens', body:`The fight was the first rupture; the mental break was the second. Anxiety. Depression. A relationship deteriorating completely. A brand being built entirely alone without financial return. Forty-one roles occupied simultaneously by one single person.

Most people in those exact conditions stop. I made more work. The mental break did not interrupt the creative practice; it deepened it. The intense psychological pressure became the physical material. The clown faces with dollar-sign teeth. The maze with the Fool's Hotel. The HA HA HA covering entire notebook surfaces in deep red ink. The figure with the door in their chest. These pieces are not about the mental break; they are the mental break made visible.`, tags:['mental-break','channel']},
    {title:'The Villain Era — The Decision', body:`After the break came a decision. Not a plan. Not a strategy. A fundamental, permanent identity decision. Villain era. Selfish era. Which in psychological terms means: I am going to stop making myself smaller for systems, relationships, and expectations that require my diminishment as the explicit price of their comfort.

This decision is permanent. It lives directly on the body. The tattoo on the hand that makes the work—the Cheshire cat's smile with the Joker's lips, outlined in red—is the declaration made physical flesh.

The name Maurrice, derived directly from The Joker by the Steve Miller Band—the song my father chose before I existed—means the smile was always there. The villain era didn't create the smile; it gave it permission to be visible.`, tags:['villain-era','decision','tattoo']},
    {title:'The Crucible Years & The Stillness', body:`During those five years (2020-2025), there was almost zero immediate external or financial return. I was forced to maintain forty-one separate roles within the company completely alone while navigating a full-time job outside it. The external infrastructure was eventually dismantled completely because it was structurally unsustainable. I defined it as a necessary clearing. In those hidden years, the brand survived completely inside my private notebooks.

After the dismantling came stillness. And in that stillness, the deeper, true version of the brand surfaced. The definitive brain-heart-hands logo arrived in minutes during that stillness. The first run's infrastructure had to collapse for the real architecture to be seen.`, tags:['crucible','stillness','logo']}

  'lineage': [
    {title:'1. Vincent Van Gogh — Psychological Necessity', body:`The lineage of psychological necessity. Van Gogh did not paint fields because he found nature pretty; he painted fields because the sky behind his eyes was burning. His work proves that psychological pressure can be forced through a brush to create a high-value physical reality.`, tags:['lineage','van-gogh','pressure']},
    {title:'2. Jean-Michel Basquiat — The Visual Language', body:`The lineage of the visual language. Basquiat did not compose paintings; he left receipts. His use of anatomy, crowns, and crossed-out words was a direct transcription of a mind dealing with the friction of a world it was built too sensitive for. He proved that a visual mark could bypass traditional artistic gatekeepers through raw intensity.`, tags:['lineage','basquiat','receipts']},
    {title:'3. Keith Haring — Distribution', body:`The lineage of distribution. Haring understood that a symbol must carry biological speed. His lines don't stop because the message couldn't wait. More importantly, his creation of the Pop Shop proved that high art belongs on a t-shirt or a public wall just as much as it does inside a gallery. The distribution method is the art.`, tags:['lineage','haring','distribution']},
    {title:'4. Russ — The Operational Lineage', body:`The operational lineage. The DIY totality. The volume as strategy. The ownership philosophy. The manifestation practice demonstrated through an entire independent career.

His book It's All In Your Head is the founding text of Psyched Luxuries because it confirmed in language what the brand had already been practicing in action.`, tags:['lineage','russ','ownership']}

    {title:'The Three Components', body:`Between 2011 and 2016, Russ released over 80 songs across eleven albums independently, without label infrastructure, industry validation, or significant early audience response.

The model had three components working simultaneously: Consistency, Volume, and Ownership.

The archive already contains multiples of 52 deployable pieces. The volume constraint that Russ faced does not exist for Psyched Luxuries in the same way. The production has already happened. The constraint is curation and deployment, not creation.

The solution is front-loading labor so execution during heavy work periods requires almost nothing. Batch creation absorbs production work into concentrated sessions. Scheduling automation removes daily decision-making.`, tags:['russ','consistency','volume','ownership']},
    {title:'The 52-Week Structure', body:`Four quarters of thirteen weeks each. Each quarter with loose thematic coherence drawn from the archive's natural groupings.

• Quarter One (Foundation): Core visual language introduced. The chaos forms. The golden curve work. The dollar arrow. The audience's first extended exposure to the vocabulary.

• Quarter Two (Philosophy Made Visible): Drops carrying the philosophical content most explicitly. The audience begins understanding what the visual language is arguing.

• Quarter Three (The Shadow): Selected pieces from the darker register. The clown series. The maze work. The depth beneath the surface made partially visible.

• Quarter Four (The Proof): Product-forward. The pieces that generated the strongest organic signal across the first three quarters get their full product treatment.`, tags:['52-week','quarters','calendar']}

// ─── STORAGE ───
const SK = 'codex-master-v1';

function buildDefaultState() {
  const now = Date.now();
  return {
    chambers: DEFAULT_CHAMBERS.map(c => ({
      ...c,
      entries: (SEEDED_ENTRIES[c.id] || []).map((e, i) => ({
        id: 'seed_' + c.id + '_' + i,
        title: e.title,
        body: e.body,
        tags: e.tags || [],
        created: now - (1000 * i),
        updated: now - (1000 * i)
      }))
    })),
    activeId: 'page-zero'
  };
}

function load() {
  try {
    const raw = localStorage.getItem(SK);
    if (raw) {
      const s = JSON.parse(raw);
      const have = new Set(s.chambers.map(c => c.id));
      const additions = DEFAULT_CHAMBERS.filter(c => !have.has(c.id)).map(c => ({
        ...c,
        entries: (SEEDED_ENTRIES[c.id] || []).map((e, i) => ({
          id: 'seed_' + c.id + '_' + i,
          title: e.title, body: e.body, tags: e.tags || [],
          created: Date.now() - (1000 * i), updated: Date.now() - (1000 * i)
        }))
      }));
      if (additions.length) s.chambers = [...s.chambers, ...additions];
      return s;
    }
  } catch(e) {}
  return buildDefaultState();
}
function save(s) { try { localStorage.setItem(SK, JSON.stringify(s)); } catch(e) {} }
function uid() { return 'e_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }
function slugify(s) { return s.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'c-'+Date.now(); }

// ─── DOM HELPERS ───
function h(tag, props, ...kids) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(props||{})) {
    if (k === 'cls') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (typeof v === 'function') e.addEventListener(k, v);
    else if (v === true) e.setAttribute(k, '');
    else if (v !== false && v != null) e.setAttribute(k, v);
  }
  for (const k of kids) {
    if (k == null) continue;
    e.append(typeof k === 'string' ? document.createTextNode(k) : k);
  }
  return e;
}

// ─── STATE ───
let ST = load();
let modal = null;
let editingEntry = null;
let searchQuery = '';
let expandedEntry = null;

function activeChamber() { return ST.chambers.find(c => c.id === ST.activeId) || ST.chambers[0]; }
function totalEntries() { return ST.chambers.reduce((a,c) => a + (c.entries?.length||0), 0); }
function setActive(id) { ST.activeId = id; expandedEntry = null; save(ST); render(); }

function render() {
  const root = document.getElementById('app');
  root.innerHTML = '';
  root.appendChild(mainView());
  if (modal) root.appendChild(modalView());
}

function mainView() {
  const wrap = h('div', {cls:'app'});
  const c = activeChamber();
  wrap.appendChild(h('div', {cls:'head'},
    h('div', {cls:'brand'},
      h('span', {cls:'mark'}, '✶'),
      h('span', {cls:'title'}, 'CODEX'),
      h('span', {cls:'count'}, String(totalEntries()))
    ),
    h('button', {cls:'menu-btn', 'aria-label':'Menu', click:()=>{modal='data';render();}},
      h('span'), h('span'), h('span')
    )
  ));
  const search = h('input', {cls:'search', type:'search', placeholder:'Search the Codex...', value:searchQuery});
  search.addEventListener('input', e => { searchQuery = e.target.value; renderEntriesOnly(); });
  wrap.appendChild(h('div', {cls:'search-wrap'}, search));
  const rail = h('div', {cls:'chamber-rail'});
  ST.chambers.forEach(ch => {
    const chip = h('button', {cls:'chamber-chip' + (ch.id === ST.activeId ? ' active' : ''), click:()=>setActive(ch.id)},
      h('span', {cls:'num'}, 'CH ' + (ch.num||'')),
      h('span', {cls:'nm'}, ch.name),
      h('span', {cls:'ct'}, (ch.entries?.length||0) + ' entries')
    );
    rail.appendChild(chip);
  });
  wrap.appendChild(rail);
  wrap.appendChild(h('div', {cls:'chamber-head'},
    h('div', {cls:'chamber-meta'},
      h('div', {cls:'chamber-num'}, 'CHAMBER ' + (c.num || '')),
      h('div', {cls:'chamber-name'}, c.name),
      h('div', {cls:'chamber-desc'}, c.desc || '')
    ),
    h('button', {cls:'new-btn', click:()=>{editingEntry=null;modal='newEntry';render();}}, '+ New')
  ));
  const entriesEl = h('div', {cls:'entries', id:'entries-container'});
  renderEntriesInto(entriesEl);
  wrap.appendChild(entriesEl);
  wrap.appendChild(h('div', {cls:'foot'},
    h('span', {cls:'mono'}, 'local · offline · yours'),
    h('button', {cls:'link', click:()=>{modal='data';render();}}, 'library')
  ));
  wrap.appendChild(h('button', {cls:'fab', 'aria-label':'New entry', click:()=>{editingEntry=null;modal='newEntry';render();}}, '+'));
  return wrap;
}

function renderEntriesOnly() {
  const el = document.getElementById('entries-container');
  if (!el) return;
  el.innerHTML = '';
  renderEntriesInto(el);
}

function renderEntriesInto(container) {
  const c = activeChamber();
  let entries = c.entries || [];
  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    entries = [];
    ST.chambers.forEach(ch => {
      (ch.entries||[]).forEach(e => {
        if ((e.title||'').toLowerCase().includes(q) ||
            (e.body||'').toLowerCase().includes(q) ||
            (e.tags||[]).some(t => t.toLowerCase().includes(q))) {
          entries.push({...e, _chamber: ch.name, _chamberId: ch.id});
        }
      });
    });
  }
  entries = [...entries].sort((a,b) => (b.updated||b.created||0) - (a.updated||a.created||0));
  if (!entries.length) {
    const e = h('div', {cls:'empty'});
    if (searchQuery.trim()) e.innerHTML = 'No matches for <em>' + escapeHtml(searchQuery) + '</em>';
    else e.innerHTML = 'Empty chamber. Tap <em>+ New</em> to write the first entry.';
    container.appendChild(e);
    return;
  }
  entries.forEach(entry => {
    const isExpanded = expandedEntry === entry.id;
    const card = h('div', {cls: 'entry' + (isExpanded ? '' : ' collapsed'), click: () => {
      expandedEntry = isExpanded ? null : entry.id;
      renderEntriesOnly();
    }});
    card.appendChild(h('div', {cls:'entry-head'},
      h('div', {cls:'entry-title'}, entry.title || '(untitled)'),
      h('div', {cls:'entry-date'}, entry.updated ? new Date(entry.updated).toISOString().slice(0,10) : '')
    ));
    if (entry._chamber && searchQuery.trim()) {
      card.appendChild(h('div', {cls:'entry-date', style:'margin-bottom:8px;color:var(--accent-soft)'}, '▸ ' + entry._chamber));
    }
    card.appendChild(h('div', {cls:'entry-body'}, entry.body || ''));
    if (entry.tags && entry.tags.length) {
      const tags = h('div', {cls:'entry-tags'});
      entry.tags.forEach(t => tags.appendChild(h('span', {cls:'tag'}, t)));
      card.appendChild(tags);
    }
    if (isExpanded) {
      const actions = h('div', {cls:'row', style:'margin-top:14px'},
        h('button', {cls:'ghost', click:(ev)=>{
          ev.stopPropagation();
          if (entry._chamberId) ST.activeId = entry._chamberId;
          editingEntry = entry; modal = 'editEntry'; render();
        }}, 'Edit'),
        h('button', {cls:'ghost danger', click:(ev)=>{
          ev.stopPropagation();
          if (!confirm('Delete this entry?')) return;
          const chId = entry._chamberId || ST.activeId;
          ST.chambers = ST.chambers.map(ch => ch.id===chId ? {...ch, entries: ch.entries.filter(x=>x.id!==entry.id)} : ch);
          save(ST); expandedEntry = null; render();
        }}, 'Delete')
      );
      card.appendChild(actions);
    }
    container.appendChild(card);
  });
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

function modalView() {
  if (modal === 'newEntry' || modal === 'editEntry') return entryModal();
  if (modal === 'data') return dataModal();
  if (modal === 'newChamber') return newChamberModal();
}
function modalShell(title, sub) {
  const backdrop = h('div', {cls:'modal-backdrop'});
  backdrop.addEventListener('click', e => {if(e.target===backdrop){modal=null;editingEntry=null;render();}});
  const m = h('div', {cls:'modal'});
  m.appendChild(h('div', {cls:'modal-head'},
    h('div', {},
      h('h2', {}, title),
      sub ? h('div', {cls:'sub'}, sub) : null
    ),
    h('button', {cls:'x', click:()=>{modal=null;editingEntry=null;render();}}, '✕')
  ));
  backdrop.appendChild(m);
  return {backdrop, m};
}
function entryModal() {
  const isEdit = modal === 'editEntry';
  const c = activeChamber();
  const e = isEdit ? editingEntry : null;
  const {backdrop, m} = modalShell(isEdit ? 'Edit entry' : 'New entry', 'CHAMBER · ' + c.name.toUpperCase());
  const chSel = h('select', {cls:'ipt mono-ipt'});
  ST.chambers.forEach(ch => {
    const o = h('option', {value:ch.id}, ch.num + ' · ' + ch.name);
    if (ch.id === c.id) o.selected = true;
    chSel.appendChild(o);
  });
  const titleIn = h('input', {cls:'ipt title-ipt', placeholder:'Title', value: e?.title || ''});
  const bodyIn = h('textarea', {cls:'ipt', rows:'14', placeholder:'Write the entry.'});
  bodyIn.value = e?.body || '';
  const tagsIn = h('input', {cls:'ipt mono-ipt', placeholder:'tags, comma-separated', value: (e?.tags||[]).join(', ')});
  const submitBtn = h('button', {cls:'primary', click:()=>{
    const title = titleIn.value.trim();
    const body = bodyIn.value.trim();
    if (!title && !body) { alert('Add a title or body.'); return; }
    const targetChId = chSel.value;
    const tags = tagsIn.value.split(',').map(t=>t.trim()).filter(Boolean);
    const now = Date.now();
    if (isEdit) {
      const currentChId = ST.chambers.find(ch => (ch.entries||[]).some(x => x.id === e.id))?.id;
      ST.chambers = ST.chambers.map(ch => {
        if (ch.id === currentChId) return {...ch, entries: ch.entries.filter(x => x.id !== e.id)};
        return ch;
      });
      const updated = {...e, title, body, tags, updated: now};
      ST.chambers = ST.chambers.map(ch => ch.id===targetChId ? {...ch, entries:[updated, ...(ch.entries||[])]} : ch);
      ST.activeId = targetChId;
    } else {
      const newEntry = {id: uid(), title, body, tags, created: now, updated: now};
      ST.chambers = ST.chambers.map(ch => ch.id===targetChId ? {...ch, entries:[newEntry, ...(ch.entries||[])]} : ch);
      ST.activeId = targetChId;
    }
    save(ST); modal = null; editingEntry = null; render();
  }}, isEdit ? 'Save changes' : 'Create entry');
  m.append(
    h('label', {cls:'lbl'}, 'Chamber'), chSel,
    h('label', {cls:'lbl'}, 'Title'), titleIn,
    h('label', {cls:'lbl'}, 'Body'), bodyIn,
    h('label', {cls:'lbl'}, 'Tags'), tagsIn,
    submitBtn
  );
  return backdrop;
}
function dataModal() {
  const {backdrop, m} = modalShell('Library', 'CODEX · LOCAL');
  const stats = h('div', {style:'display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px'});
  stats.appendChild(h('div', {style:'padding:14px;border:1px solid var(--line);border-radius:12px'},
    h('div', {style:'font-family:var(--mono);font-size:9px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px'}, 'Chambers'),
    h('div', {style:'font-weight:800;font-size:24px'}, String(ST.chambers.length))
  ));
  stats.appendChild(h('div', {style:'padding:14px;border:1px solid var(--line);border-radius:12px'},
    h('div', {style:'font-family:var(--mono);font-size:9px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px'}, 'Entries'),
    h('div', {style:'font-weight:800;font-size:24px'}, String(totalEntries()))
  ));
  m.appendChild(stats);
  const list = h('ul', {cls:'chamber-edit-list'});
  ST.chambers.forEach(ch => {
    const li = h('li');
    li.appendChild(h('span', {style:'font-family:var(--mono);color:var(--accent);font-size:10px;letter-spacing:.1em;width:36px'}, ch.num || ''));
    li.appendChild(h('span', {cls:'nm'}, ch.name));
    li.appendChild(h('span', {cls:'ct'}, (ch.entries?.length||0) + ' entries'));
    const del = h('button', {cls:'x', style:'width:28px;height:28px;font-size:11px', click:()=>{
      if (ST.chambers.length <= 1) { alert('Keep at least one chamber.'); return; }
      if (!confirm('Delete chamber "' + ch.name + '" and all its entries?')) return;
      ST.chambers = ST.chambers.filter(x => x.id !== ch.id);
      if (ST.activeId === ch.id) ST.activeId = ST.chambers[0].id;
      save(ST); render();
    }}, '🗑');
    li.appendChild(del);
    list.appendChild(li);
  });
  m.appendChild(list);
  m.appendChild(h('button', {cls:'ghost', style:'display:block;width:100%;margin-top:10px;padding:14px', click:()=>{modal='newChamber';render();}}, '+ Add chamber'));
  const fi = h('input', {type:'file', accept:'.json,application/json', style:'display:none'});
  fi.addEventListener('change', () => {
    const f = fi.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (!d.chambers || !Array.isArray(d.chambers)) throw 0;
        if (!confirm('Replace current Codex with imported file? This cannot be undone.')) return;
        ST = {chambers: d.chambers, activeId: d.activeId || d.chambers[0].id};
        save(ST); modal=null; render();
        alert('Imported ' + d.chambers.length + ' chambers.');
      } catch(e) { alert('Could not read file.'); }
    };
    r.readAsText(f);
  });
  const da = h('div', {cls:'data-actions'});
  da.appendChild(h('button', {cls:'ghost', click:()=>{
    const blob = new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'codex-' + today() + '.json'; a.click();
    URL.revokeObjectURL(url);
  }}, '↓ Export JSON'));
  da.appendChild(h('button', {cls:'ghost', click:()=>{
    let md = '# Psyched Luxuries — Master Codex\n\nExported ' + today() + '\n\n';
    ST.chambers.forEach(ch => {
      md += '\n---\n\n## ' + (ch.num ? ch.num + ' · ' : '') + ch.name + '\n\n';
      if (ch.desc) md += '_' + ch.desc + '_\n\n';
      (ch.entries||[]).forEach(e => {
        md += '### ' + (e.title || '(untitled)') + '\n\n';
        if (e.body) md += e.body + '\n\n';
        if (e.tags && e.tags.length) md += '*Tags: ' + e.tags.join(', ') + '*\n\n';
      });
    });
    const blob = new Blob([md],{type:'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'codex-' + today() + '.md'; a.click();
    URL.revokeObjectURL(url);
  }}, '↓ Export Markdown'));
  da.appendChild(h('button', {cls:'ghost', click:()=>fi.click()}, '↑ Import JSON'));
  da.appendChild(fi);
  da.appendChild(h('button', {cls:'ghost danger', click:()=>{
    if (!confirm('Reset Codex to the seeded Master Codex? ALL custom edits will be erased.')) return;
    if (!confirm('Are you absolutely sure? This cannot be undone.')) return;
    localStorage.removeItem(SK);
    ST = load(); modal=null; render();
  }}, 'Reset to Master Codex'));
  m.appendChild(da);
  m.appendChild(h('p', {cls:'hint'}, 'The Codex lives on this device only. Export regularly to back up. Drop the JSON on a new device and Import to restore.'));
  return backdrop;
}
function newChamberModal() {
  const {backdrop, m} = modalShell('New chamber', 'CODEX · STRUCTURE');
  const numIn = h('input', {cls:'ipt mono-ipt', placeholder:'XIV'});
  const nameIn = h('input', {cls:'ipt title-ipt', placeholder:'Chamber name'});
  const descIn = h('input', {cls:'ipt', placeholder:'What lives here?'});
  m.append(
    h('label', {cls:'lbl'}, 'Number / sigil'), numIn,
    h('label', {cls:'lbl'}, 'Name'), nameIn,
    h('label', {cls:'lbl'}, 'Description'), descIn,
    h('button', {cls:'primary', click:()=>{
      const name = nameIn.value.trim();
      if (!name) { alert('Name the chamber.'); return; }
      const base = slugify(name); let id = base, n = 1;
      while (ST.chambers.find(c => c.id === id)) id = base + '-' + (++n);
      ST.chambers = [...ST.chambers, {id, num: numIn.value.trim(), name, desc: descIn.value.trim(), entries:[]}];
      ST.activeId = id;
      save(ST); modal='data'; render();
    }}, 'Create chamber')
  );
  return backdrop;
}

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
</body>
