<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0908"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Drops"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png"/>
<link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>

<title>Psyched Luxuries · Drops</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#0a0908;--bg-2:#13110d;--bg-3:#1c1814;--line:#2d2820;--line-2:#3d3528;--fg:#f4ecd8;--mute:#8a8170;--accent:#d4b87a;--accent-soft:#e8d5a3;--accent-dim:#7a6a48;--display:'Fraunces',Georgia,serif;--mono:'Inter',system-ui,sans-serif;--q1:#8c6d3a;--q2:#a8855a;--q3:#5a4426;--q4:#c9a961}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--display);overscroll-behavior:none}
body{min-height:100svh}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
input,select,textarea{font:inherit;color:inherit;background:none}
.app{display:flex;flex-direction:column;min-height:100svh;padding-top:env(safe-area-inset-top);padding-bottom:calc(56px + env(safe-area-inset-bottom));max-width:820px;margin:0 auto}

/* header */
.head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 12px}
.brand{display:flex;align-items:baseline;gap:10px}
.mark{font-size:20px;color:var(--accent)}
.title{font-weight:500;letter-spacing:.08em;font-size:24px;font-style:italic}
.count{font-family:var(--mono);font-size:11px;color:var(--mute);letter-spacing:.1em;padding:4px 8px;border:1px solid var(--line);border-radius:99px}
.menu-btn{width:40px;height:40px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px}
.menu-btn span{width:18px;height:2px;background:var(--fg);display:block}
.menu-btn span:nth-child(2){width:12px}

/* tabs */
.tabs{display:flex;gap:4px;padding:0 22px 16px}
.tab{flex:1;padding:11px 8px;border:1px solid var(--line);border-radius:10px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);transition:.15s;text-align:center;font-weight:500}
.tab.active{background:var(--accent);color:#1a1410;border-color:var(--accent)}
.tab:not(.active):hover{color:var(--fg);border-color:var(--line-2)}

/* content */
.pane{flex:1;padding:0 22px 22px}

/* ━━ SEQUENCER ━━ */
.seq-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.seq-title{font-weight:500;font-size:28px;letter-spacing:-.015em}
.seq-sub{font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.quarter{margin-bottom:24px}
.quarter-head{display:flex;align-items:baseline;gap:12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.quarter-num{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--accent)}
.quarter-name{font-weight:500;font-size:18px;letter-spacing:-.005em}
.quarter-theme{font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:.06em;text-transform:uppercase;margin-left:auto}
.week-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px}
.week-cell{aspect-ratio:1;border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.12s;position:relative;overflow:hidden;background:transparent}
.week-cell:hover{border-color:var(--accent-dim)}
.week-cell.has-drops{background:var(--bg-2);border-color:var(--accent-dim)}
.week-cell.current{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.week-num{font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:.04em}
.week-cell.has-drops .week-num{color:var(--fg)}
.week-dots{display:flex;gap:2px;margin-top:3px;min-height:4px}
.week-dot{width:4px;height:4px;border-radius:99px;background:var(--accent)}

/* ━━ TRACKER ━━ */
.tracker-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.tracker-controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-chip{padding:8px 12px;border:1px solid var(--line);border-radius:99px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute);cursor:pointer;transition:.15s;background:none}
.filter-chip.active{color:var(--accent);border-color:var(--accent)}
.drop-list{display:flex;flex-direction:column;gap:8px}
.drop-row{border:1px solid var(--line);border-radius:14px;background:var(--bg-2);padding:16px 18px;cursor:pointer;transition:.15s}
.drop-row:hover{border-color:var(--line-2)}
.drop-row-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.drop-row-title{font-weight:500;font-size:17px;line-height:1.3;letter-spacing:-.005em;flex:1}
.drop-row-status{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:99px;border:1px solid var(--line);color:var(--mute);flex-shrink:0;white-space:nowrap}
.drop-row-status.scheduled{color:var(--accent);border-color:var(--accent-dim)}
.drop-row-status.posted{color:var(--accent-soft);border-color:var(--accent);background:rgba(212,184,122,.08)}
.drop-row-meta{display:flex;flex-wrap:wrap;gap:14px;font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:.06em}
.drop-row-meta span{display:inline-flex;align-items:center;gap:4px}
.drop-row-meta strong{color:var(--fg);font-weight:600}
.drop-row-engagement{margin-top:10px;display:flex;gap:14px;font-family:var(--mono);font-size:11px;color:var(--mute)}
.drop-row-engagement strong{color:var(--accent);font-weight:600}

/* ━━ BUILDER ━━ */
.builder{display:flex;flex-direction:column;gap:0}
.lbl{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);margin:16px 0 6px;font-weight:500}
.lbl:first-child{margin-top:0}
.ipt{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:13px 14px;color:var(--fg);font-size:15px;line-height:1.4;outline:none;transition:.15s;font-family:var(--display)}
.ipt:focus{border-color:var(--accent-dim)}
.ipt.mono-ipt{font-family:var(--mono);font-size:13px}
textarea.ipt{resize:vertical;min-height:90px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:480px){.row3{grid-template-columns:1fr 1fr}}

.output-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
.output-block{margin-bottom:16px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.output-head{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--bg-2);border-bottom:1px solid var(--line)}
.output-label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.copy-btn{font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:.15s;background:none}
.copy-btn:hover{color:var(--accent);border-color:var(--accent-dim)}
.copy-btn.copied{color:var(--accent);border-color:var(--accent)}
.output-body{padding:14px;font-size:14px;line-height:1.6;color:var(--fg);white-space:pre-wrap;word-break:break-word}
.output-body.mono{font-family:var(--mono);font-size:12px}

.primary{margin-top:18px;width:100%;background:var(--accent);color:#1a1410;border-radius:12px;padding:18px;font-weight:600;font-size:15px;border:0;cursor:pointer;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;transition:.15s}
.primary:hover{background:var(--accent-soft)}
.primary.secondary{background:none;color:var(--fg);border:1px solid var(--line)}
.primary.secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn-row .primary{margin-top:0;flex:1}

.empty{padding:60px 20px;text-align:center;color:var(--mute);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;line-height:1.6}
.empty em{color:var(--fg);font-style:normal}

/* footer */
.foot{display:flex;justify-content:space-between;align-items:center;padding:10px 22px 18px;font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase}
.link{color:var(--fg);text-decoration:underline;text-underline-offset:3px;background:none;border:0;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}

/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.modal{background:var(--bg-2);border-top:1px solid var(--line);border-radius:24px 24px 0 0;width:100%;max-width:820px;max-height:92svh;overflow-y:auto;padding:18px 22px;padding-bottom:calc(56px + env(safe-area-inset-bottom))}
@media(min-width:720px){.modal-backdrop{align-items:center}.modal{border-radius:24px;border:1px solid var(--line);max-height:85vh}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg-2);z-index:2}
.modal-head h2{margin:0;font-size:22px;font-weight:500;letter-spacing:-.01em;font-family:var(--display)}
.modal-head .sub{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.12em;margin-top:2px;text-transform:uppercase}
.x{width:36px;height:36px;border:1px solid var(--line);border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--mute);cursor:pointer}

.engagement-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:6px}
.engagement-input{display:flex;flex-direction:column;gap:4px}
.engagement-input label{font-family:var(--mono);font-size:9px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase}

.detail-section{margin-bottom:18px}
.detail-section h3{margin:0 0 8px;font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.detail-section p{margin:0;font-size:14px;line-height:1.55;color:var(--fg)}
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-family:var(--mono);font-size:11px}
.detail-meta div{padding:10px 12px;border:1px solid var(--line);border-radius:8px}
.detail-meta div span{display:block;font-size:9px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.detail-meta div strong{font-weight:500;color:var(--fg);font-size:14px}

.action-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.action-row button{flex:1;min-width:120px}

.fab{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom));right:22px;width:60px;height:60px;border-radius:99px;background:var(--accent);color:#1a1410;font-size:28px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px -4px rgba(212,184,122,.35);z-index:30}
.fab:active{transform:translateY(2px)}

.data-actions{display:flex;flex-direction:column;gap:8px;margin-top:18px}
.data-actions button{padding:14px;display:block;width:100%;border:1px solid var(--line);border-radius:12px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:none;color:var(--fg);cursor:pointer;text-align:center}
.data-actions button.danger{color:var(--accent);border-color:var(--accent-dim)}
.hint{margin-top:18px;font-size:11px;color:var(--mute);line-height:1.6;font-family:var(--mono);letter-spacing:.02em}

.__pl-notch{
  position:fixed;top:0;left:0;right:0;
  height:env(safe-area-inset-top);
  background:#0a0908;
  border-bottom:1px solid rgba(201,168,76,.18);
  z-index:99998;
}
.__pl-back{
  position:fixed;bottom:0;left:0;right:0;z-index:99999;
  height:calc(44px + env(safe-area-inset-bottom));
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:10px;
  background:rgba(10,9,8,.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(201,168,76,.18);
  color:#f4ecd8;text-decoration:none;
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;font-size:14px;letter-spacing:.04em;
  cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
  gap:8px;
}
.__pl-back:active{background:rgba(20,18,14,.98)}
.__pl-back .__pl-arrow{font-family:system-ui;font-style:normal;color:#c9a84c;font-size:15px;line-height:1}
.__pl-back .__pl-dot{width:5px;height:5px;border-radius:99px;background:#c9a84c;margin-left:1px;display:inline-block;vertical-align:middle}
</style>
</head>
<body>
<div class="__pl-notch"></div>
<style>

</style>
<a href="./index.html" class="__pl-back" aria-label="Back to Psyched Luxuries">
  <span class="__pl-arrow">←</span><span>Psyched</span><span class="__pl-dot"></span>
</a>

<div id="app"></div>
<script>

// ─── CONSTANTS ───
const GLYPHS = [
  {id:'money-grin',     name:'Money Grin',       meaning:'The way they shut you up'},
  {id:'money-goes-up',  name:'Money Goes Up',    meaning:'Money always goes up'},
  {id:'karmic-cycle',   name:'Karmic Cycle',     meaning:'What goes around comes around'},
  {id:'money-glyphguy', name:'Money Glyphguy',   meaning:'Money manifestation'},
  {id:'glyphguy-work',  name:'Glyphguy at Work', meaning:'Working through it'},
  {id:'glyphs-with-box',name:'Glyphs with Box',  meaning:'A gift'},
  {id:'love-yourself',  name:'Love Yourself',    meaning:'Love yourself'},
  {id:'fucked-cycle',   name:'Fucked Cycle',     meaning:'Break the fucked cycle'},
  {id:'brain-heart-hands', name:'Brain Heart Hands', meaning:'The master logo'},
  {id:'chaos-forms',    name:'Chaos Forms',      meaning:'The curves never intersect; they negotiate'}
];

const QUARTERS = [
  {num:'Q1', name:'Foundation',           theme:'Visual language introduced',  weeks:[1,13]},
  {num:'Q2', name:'Philosophy Made Visible', theme:'Argument carried explicitly', weeks:[14,26]},
  {num:'Q3', name:'The Shadow',           theme:'Darker register surfaces',    weeks:[27,39]},
  {num:'Q4', name:'The Proof',            theme:'Strongest signal scaled',     weeks:[40,52]}
];

const PRODUCT_TYPES = ['Tee','Croptop','Crewneck','Sweatshirt','Hoodie','Sweatpants','Tumbler','Sticker','Print','Other'];
const PRICING = {Tee:60,Croptop:55,Crewneck:90,Sweatshirt:90,Hoodie:90,Sweatpants:70,Tumbler:40,Sticker:8,Print:35,Other:60};
const STATUSES = ['planned','scheduled','posted','archived'];

// ─── STORAGE ───
const SK = 'pl-drops-v1';
function load() {
  try {
    const raw = localStorage.getItem(SK);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {drops:[], year:new Date().getFullYear(), startWeek:1};
}
function save(s) { try { localStorage.setItem(SK, JSON.stringify(s)); } catch(e) {} }
function uid() { return 'd_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }

// week of year for a date
function weekOfYear(d) {
  const date = new Date(d);
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
  const week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}
function currentWeek() { return weekOfYear(new Date()); }

// ─── DOM ───
function h(tag, props, ...kids) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(props||{})) {
    if (k === 'cls') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (typeof v === 'function') e.addEventListener(k, v);
    else if (v === true) e.setAttribute(k, '');
    else if (v !== false && v != null) e.setAttribute(k, v);
  }
  for (const k of kids) {
    if (k == null) continue;
    e.append(typeof k === 'string' ? document.createTextNode(k) : k);
  }
  return e;
}

// ─── STATE ───
let ST = load();
let tab = 'sequencer';
let modal = null;
let editingDrop = null;
let viewingDropId = null;
let viewingWeek = null;
let trackerFilter = 'all'; // all | planned | scheduled | posted | archived
let trackerSort = 'date';  // date | engagement
let builderForm = blankForm();
let builderOutputs = null;

function blankForm() {
  return {
    id: null,
    title: '',
    glyph: GLYPHS[0].id,
    product: 'Tee',
    price: 60,
    story: '',
    week: '',
    status: 'planned',
    posted_date: '',
    likes: 0, comments: 0, saves: 0, sales: 0, notes: ''
  };
}

function glyphById(id) { return GLYPHS.find(g => g.id === id) || GLYPHS[0]; }

// ─── RENDER ───
function render() {
  const root = document.getElementById('app');
  root.innerHTML = '';
  root.appendChild(mainView());
  if (modal) root.appendChild(modalView());
}

function mainView() {
  const wrap = h('div', {cls:'app'});

  // Header
  wrap.appendChild(h('div', {cls:'head'},
    h('div', {cls:'brand'},
      h('span', {cls:'mark'}, '✶'),
      h('span', {cls:'title'}, 'DROPS'),
      h('span', {cls:'count'}, ST.drops.length + ' drops')
    ),
    h('button', {cls:'menu-btn', 'aria-label':'Menu', click:()=>{modal='data';render();}},
      h('span'), h('span'), h('span')
    )
  ));

  // Tabs
  const tabs = h('div', {cls:'tabs'});
  ['sequencer','tracker','builder'].forEach(t => {
    tabs.appendChild(h('button', {
      cls:'tab' + (t === tab ? ' active' : ''),
      click:()=>{tab=t;render();}
    }, t));
  });
  wrap.appendChild(tabs);

  // Pane
  const pane = h('div', {cls:'pane'});
  if (tab === 'sequencer') pane.appendChild(sequencerView());
  else if (tab === 'tracker') pane.appendChild(trackerView());
  else pane.appendChild(builderView());
  wrap.appendChild(pane);

  // Footer
  wrap.appendChild(h('div', {cls:'foot'},
    h('span', {}, 'local · offline · yours'),
    h('button', {cls:'link', click:()=>{modal='data';render();}}, 'library')
  ));

  // FAB
  wrap.appendChild(h('button', {cls:'fab', 'aria-label':'New drop', click:()=>{
    tab = 'builder';
    builderForm = blankForm();
    builderOutputs = null;
    editingDrop = null;
    render();
    window.scrollTo({top:0, behavior:'smooth'});
  }}, '+'));

  return wrap;
}

// ─── SEQUENCER ───
function sequencerView() {
  const wrap = h('div');
  wrap.appendChild(h('div', {cls:'seq-head'},
    h('div', {},
      h('div', {cls:'seq-title'}, '52-Week Sequence'),
      h('div', {cls:'seq-sub'}, ST.year + ' · Russ Model Quarters')
    )
  ));

  const cw = currentWeek();
  QUARTERS.forEach(q => {
    const qBlock = h('div', {cls:'quarter'});
    qBlock.appendChild(h('div', {cls:'quarter-head'},
      h('span', {cls:'quarter-num'}, q.num),
      h('span', {cls:'quarter-name'}, q.name),
      h('span', {cls:'quarter-theme'}, q.theme)
    ));
    const grid = h('div', {cls:'week-grid'});
    for (let w = q.weeks[0]; w <= q.weeks[1]; w++) {
      const drops = ST.drops.filter(d => d.week === w);
      const cell = h('button', {
        cls:'week-cell' + (drops.length ? ' has-drops' : '') + (w === cw ? ' current' : ''),
        click:()=>{viewingWeek = w; modal='week'; render();}
      });
      cell.appendChild(h('span', {cls:'week-num'}, 'W' + w));
      const dots = h('div', {cls:'week-dots'});
      drops.slice(0,4).forEach(()=>dots.appendChild(h('span', {cls:'week-dot'})));
      cell.appendChild(dots);
      grid.appendChild(cell);
    }
    qBlock.appendChild(grid);
    wrap.appendChild(qBlock);
  });

  return wrap;
}

// ─── TRACKER ───
function trackerView() {
  const wrap = h('div');
  wrap.appendChild(h('div', {cls:'tracker-head'},
    h('div', {},
      h('div', {cls:'seq-title'}, 'Signal Tracker'),
      h('div', {cls:'seq-sub'}, 'What moves people')
    )
  ));

  const controls = h('div', {cls:'tracker-controls'});
  ['all','planned','scheduled','posted','archived'].forEach(f => {
    controls.appendChild(h('button', {
      cls:'filter-chip' + (trackerFilter === f ? ' active' : ''),
      click:()=>{trackerFilter = f; render();}
    }, f));
  });
  controls.appendChild(h('button', {
    cls:'filter-chip' + (trackerSort === 'engagement' ? ' active' : ''),
    click:()=>{trackerSort = trackerSort === 'engagement' ? 'date' : 'engagement'; render();}
  }, 'sort: ' + trackerSort));
  wrap.appendChild(controls);

  let drops = [...ST.drops];
  if (trackerFilter !== 'all') drops = drops.filter(d => d.status === trackerFilter);
  if (trackerSort === 'engagement') {
    drops.sort((a,b) => engagementTotal(b) - engagementTotal(a));
  } else {
    drops.sort((a,b) => (b.updated||b.created||0) - (a.updated||a.created||0));
  }

  if (!drops.length) {
    const e = h('div', {cls:'empty'});
    e.innerHTML = 'No drops yet. Tap <em>+</em> to build one.';
    wrap.appendChild(e);
    return wrap;
  }

  const list = h('div', {cls:'drop-list'});
  drops.forEach(d => {
    const g = glyphById(d.glyph);
    const row = h('div', {cls:'drop-row', click:()=>{viewingDropId = d.id; modal='detail'; render();}});
    row.appendChild(h('div', {cls:'drop-row-head'},
      h('div', {cls:'drop-row-title'}, d.title || '(untitled)'),
      h('div', {cls:'drop-row-status ' + d.status}, d.status)
    ));
    const meta = h('div', {cls:'drop-row-meta'});
    meta.appendChild(h('span', {}, h('strong', {}, g.name)));
    meta.appendChild(h('span', {}, d.product, d.price ? ' · $' + d.price : ''));
    if (d.week) meta.appendChild(h('span', {}, 'Week ' + d.week));
    if (d.posted_date) meta.appendChild(h('span', {}, d.posted_date));
    row.appendChild(meta);
    if (d.status === 'posted') {
      const eng = h('div', {cls:'drop-row-engagement'});
      eng.appendChild(h('span', {}, h('strong', {}, String(d.likes||0)), ' likes'));
      eng.appendChild(h('span', {}, h('strong', {}, String(d.comments||0)), ' comments'));
      eng.appendChild(h('span', {}, h('strong', {}, String(d.saves||0)), ' saves'));
      eng.appendChild(h('span', {}, h('strong', {}, String(d.sales||0)), ' sales'));
      row.appendChild(eng);
    }
    list.appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

function engagementTotal(d) {
  return (d.likes||0) + (d.comments||0)*3 + (d.saves||0)*5 + (d.sales||0)*20;
}

// ─── BUILDER ───
function builderView() {
  const wrap = h('div', {cls:'builder'});
  wrap.appendChild(h('div', {cls:'seq-head'},
    h('div', {},
      h('div', {cls:'seq-title'}, editingDrop ? 'Edit Drop' : 'Build a Drop'),
      h('div', {cls:'seq-sub'}, 'Form → Fourthwall · Instagram · Codex')
    )
  ));

  const f = builderForm;

  // Title
  const titleIn = h('input', {cls:'ipt', placeholder:'e.g. Money Goes Up Crewneck', value:f.title});
  titleIn.addEventListener('input', e => f.title = e.target.value);
  wrap.append(h('label', {cls:'lbl'}, 'Title'), titleIn);

  // Glyph + Product
  wrap.appendChild(h('div', {cls:'row2'},
    (()=>{
      const c = h('div');
      c.appendChild(h('label', {cls:'lbl'}, 'Glyph'));
      const sel = h('select', {cls:'ipt mono-ipt'});
      GLYPHS.forEach(g => {
        const o = h('option', {value:g.id}, g.name);
        if (g.id === f.glyph) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', e => { f.glyph = e.target.value; });
      c.appendChild(sel);
      return c;
    })(),
    (()=>{
      const c = h('div');
      c.appendChild(h('label', {cls:'lbl'}, 'Product'));
      const sel = h('select', {cls:'ipt mono-ipt'});
      PRODUCT_TYPES.forEach(p => {
        const o = h('option', {value:p}, p);
        if (p === f.product) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', e => { f.product = e.target.value; f.price = PRICING[e.target.value] || 60; render(); });
      c.appendChild(sel);
      return c;
    })()
  ));

  // Price + Week + Status
  wrap.appendChild(h('div', {cls:'row3'},
    (()=>{
      const c = h('div');
      c.appendChild(h('label', {cls:'lbl'}, 'Price ($)'));
      const ip = h('input', {cls:'ipt mono-ipt', type:'number', min:'0', value:f.price});
      ip.addEventListener('input', e => f.price = parseFloat(e.target.value) || 0);
      c.appendChild(ip);
      return c;
    })(),
    (()=>{
      const c = h('div');
      c.appendChild(h('label', {cls:'lbl'}, 'Week (1-52)'));
      const ip = h('input', {cls:'ipt mono-ipt', type:'number', min:'1', max:'52', placeholder:'—', value:f.week});
      ip.addEventListener('input', e => f.week = e.target.value ? parseInt(e.target.value) : '');
      c.appendChild(ip);
      return c;
    })(),
    (()=>{
      const c = h('div');
      c.appendChild(h('label', {cls:'lbl'}, 'Status'));
      const sel = h('select', {cls:'ipt mono-ipt'});
      STATUSES.forEach(s => {
        const o = h('option', {value:s}, s);
        if (s === f.status) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', e => { f.status = e.target.value; });
      c.appendChild(sel);
      return c;
    })()
  ));

  // Story
  const storyIn = h('textarea', {cls:'ipt', rows:'5', placeholder:'The story behind this drop. What the glyph means in this iteration. Why now.'});
  storyIn.value = f.story;
  storyIn.addEventListener('input', e => f.story = e.target.value);
  wrap.append(h('label', {cls:'lbl'}, 'Story'), storyIn);

  // Generate button
  wrap.appendChild(h('button', {cls:'primary', click:()=>{
    if (!f.title.trim()) { alert('Add a title.'); return; }
    builderOutputs = generateOutputs(f);
    render();
  }}, editingDrop ? 'Regenerate Outputs' : 'Generate Outputs'));

  // Outputs
  if (builderOutputs) {
    const out = h('div', {cls:'output-section'});
    out.appendChild(h('div', {style:'font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px;font-weight:500'}, 'Ready to Deploy'));

    ['fourthwall','instagram','codex'].forEach(key => {
      const block = h('div', {cls:'output-block'});
      const head = h('div', {cls:'output-head'});
      head.appendChild(h('span', {cls:'output-label'}, key === 'fourthwall' ? 'Fourthwall Description' : key === 'instagram' ? 'Instagram Caption' : 'Codex Entry'));
      const cb = h('button', {cls:'copy-btn'}, 'Copy');
      cb.addEventListener('click', () => {
        navigator.clipboard.writeText(builderOutputs[key]).then(()=>{
          cb.textContent = 'Copied';
          cb.classList.add('copied');
          setTimeout(()=>{cb.textContent='Copy';cb.classList.remove('copied');}, 1500);
        });
      });
      head.appendChild(cb);
      block.appendChild(head);
      block.appendChild(h('div', {cls:'output-body' + (key==='instagram'?' mono':'')}, builderOutputs[key]));
      out.appendChild(block);
    });

    // Save drop
    out.appendChild(h('div', {cls:'btn-row'},
      h('button', {cls:'primary', click:()=>{
        const now = Date.now();
        if (editingDrop) {
          ST.drops = ST.drops.map(d => d.id === editingDrop.id ? {...d, ...f, id: editingDrop.id, updated: now} : d);
        } else {
          const newDrop = {...f, id: uid(), created: now, updated: now};
          ST.drops.push(newDrop);
        }
        save(ST);
        builderForm = blankForm();
        builderOutputs = null;
        editingDrop = null;
        tab = 'tracker';
        render();
      }}, editingDrop ? 'Save Changes' : 'Save Drop'),
      h('button', {cls:'primary secondary', click:()=>{
        builderForm = blankForm();
        builderOutputs = null;
        editingDrop = null;
        render();
      }}, 'Clear')
    ));

    wrap.appendChild(out);
  }

  return wrap;
}

// ─── OUTPUT GENERATION ───
function generateOutputs(f) {
  const g = glyphById(f.glyph);
  const story = (f.story || '').trim();
  const title = f.title.trim();

  // Fourthwall description (premium voice, longer)
  const fw = [
    title + '.',
    '',
    g.meaning + '.',
    story ? '\n' + story : '',
    '',
    'Carrying the ' + g.name + ' glyph from the Psyched Luxuries archive. The visual language is not decoration. It is law.',
    '',
    'Prepared for luxury. You are in control of your reality. What persists in the mind becomes your reality.',
    '',
    'Watch this.'
  ].filter(Boolean).join('\n').replace(/\n{3,}/g,'\n\n');

  // Instagram caption (tighter, ends "Watch this.")
  const ig = [
    title.toUpperCase(),
    '',
    g.meaning + '.',
    story ? '' : null,
    story || null,
    '',
    '— ' + g.name,
    '',
    f.price ? '$' + f.price + ' · psychedluxuries.com' : 'psychedluxuries.com',
    '',
    'Watch this.'
  ].filter(x => x !== null).join('\n').replace(/\n{3,}/g,'\n\n');

  // Codex entry (archival format)
  const cd = [
    'TITLE: ' + title,
    'GLYPH: ' + g.name + ' (' + g.id + ')',
    'PRODUCT: ' + f.product + (f.price ? ' · $' + f.price : ''),
    f.week ? 'WEEK: ' + f.week : null,
    'STATUS: ' + f.status,
    'DATE: ' + today(),
    '',
    'MEANING:',
    g.meaning + '.',
    '',
    story ? 'STORY:' : null,
    story || null,
    '',
    'The garment as a philosophical object. The glyph as law made wearable.',
    '',
    'Watch this.'
  ].filter(x => x !== null).join('\n');

  return {fourthwall: fw, instagram: ig, codex: cd};
}

// ─── MODALS ───
function modalView() {
  if (modal === 'week')   return weekModal();
  if (modal === 'detail') return detailModal();
  if (modal === 'engagement') return engagementModal();
  if (modal === 'data')   return dataModal();
}
function modalShell(title, sub) {
  const backdrop = h('div', {cls:'modal-backdrop'});
  backdrop.addEventListener('click', e => {if(e.target===backdrop){modal=null;viewingWeek=null;viewingDropId=null;render();}});
  const m = h('div', {cls:'modal'});
  m.appendChild(h('div', {cls:'modal-head'},
    h('div', {},
      h('h2', {}, title),
      sub ? h('div', {cls:'sub'}, sub) : null
    ),
    h('button', {cls:'x', click:()=>{modal=null;viewingWeek=null;viewingDropId=null;render();}}, '✕')
  ));
  backdrop.appendChild(m);
  return {backdrop, m};
}

function weekModal() {
  const w = viewingWeek;
  const q = QUARTERS.find(q => w >= q.weeks[0] && w <= q.weeks[1]);
  const {backdrop, m} = modalShell('Week ' + w, q ? q.num + ' · ' + q.name : '');
  const drops = ST.drops.filter(d => d.week === w);
  if (!drops.length) {
    const e = h('div', {cls:'empty', style:'padding:30px 10px'});
    e.innerHTML = 'No drops scheduled for week ' + w + '.';
    m.appendChild(e);
  } else {
    const list = h('div', {cls:'drop-list'});
    drops.forEach(d => {
      const g = glyphById(d.glyph);
      const row = h('div', {cls:'drop-row', click:()=>{viewingDropId = d.id; modal='detail'; render();}});
      row.appendChild(h('div', {cls:'drop-row-head'},
        h('div', {cls:'drop-row-title'}, d.title),
        h('div', {cls:'drop-row-status ' + d.status}, d.status)
      ));
      row.appendChild(h('div', {cls:'drop-row-meta'},
        h('span', {}, h('strong', {}, g.name)),
        h('span', {}, d.product + (d.price ? ' · $' + d.price : ''))
      ));
      list.appendChild(row);
    });
    m.appendChild(list);
  }
  m.appendChild(h('button', {cls:'primary', style:'margin-top:18px', click:()=>{
    builderForm = blankForm();
    builderForm.week = w;
    builderForm.status = 'scheduled';
    builderOutputs = null;
    editingDrop = null;
    tab = 'builder';
    modal = null;
    viewingWeek = null;
    render();
  }}, '+ New drop for week ' + w));
  return backdrop;
}

function detailModal() {
  const d = ST.drops.find(x => x.id === viewingDropId);
  if (!d) { modal = null; return h('div'); }
  const g = glyphById(d.glyph);
  const {backdrop, m} = modalShell(d.title || '(untitled)', g.name + ' · ' + d.status.toUpperCase());

  const meta = h('div', {cls:'detail-meta', style:'margin-bottom:18px'});
  meta.appendChild(h('div', {}, h('span', {}, 'Product'), h('strong', {}, d.product)));
  meta.appendChild(h('div', {}, h('span', {}, 'Price'), h('strong', {}, d.price ? '$' + d.price : '—')));
  meta.appendChild(h('div', {}, h('span', {}, 'Week'), h('strong', {}, d.week ? 'W' + d.week : '—')));
  meta.appendChild(h('div', {}, h('span', {}, 'Posted'), h('strong', {}, d.posted_date || '—')));
  m.appendChild(meta);

  if (d.story) {
    const sec = h('div', {cls:'detail-section'});
    sec.appendChild(h('h3', {}, 'Story'));
    sec.appendChild(h('p', {}, d.story));
    m.appendChild(sec);
  }

  if (d.status === 'posted' || d.likes || d.comments || d.saves || d.sales) {
    const sec = h('div', {cls:'detail-section'});
    sec.appendChild(h('h3', {}, 'Engagement'));
    const grid = h('div', {cls:'detail-meta'});
    grid.appendChild(h('div', {}, h('span', {}, 'Likes'), h('strong', {}, String(d.likes||0))));
    grid.appendChild(h('div', {}, h('span', {}, 'Comments'), h('strong', {}, String(d.comments||0))));
    grid.appendChild(h('div', {}, h('span', {}, 'Saves'), h('strong', {}, String(d.saves||0))));
    grid.appendChild(h('div', {}, h('span', {}, 'Sales'), h('strong', {}, String(d.sales||0))));
    sec.appendChild(grid);
    m.appendChild(sec);
  }

  if (d.notes) {
    const sec = h('div', {cls:'detail-section'});
    sec.appendChild(h('h3', {}, 'Notes'));
    sec.appendChild(h('p', {}, d.notes));
    m.appendChild(sec);
  }

  // Actions
  const actions = h('div', {cls:'action-row'});
  if (d.status !== 'posted') {
    actions.appendChild(h('button', {cls:'primary', click:()=>{
      modal = 'engagement';
      render();
    }}, 'Mark Posted'));
  } else {
    actions.appendChild(h('button', {cls:'primary', click:()=>{
      modal = 'engagement';
      render();
    }}, 'Update Engagement'));
  }
  actions.appendChild(h('button', {cls:'primary secondary', click:()=>{
    builderForm = {...blankForm(), ...d};
    builderOutputs = generateOutputs(builderForm);
    editingDrop = d;
    tab = 'builder';
    modal = null;
    viewingDropId = null;
    render();
  }}, 'Edit'));
  actions.appendChild(h('button', {cls:'primary secondary', style:'color:var(--accent);border-color:var(--accent-dim)', click:()=>{
    if (!confirm('Delete "' + d.title + '"?')) return;
    ST.drops = ST.drops.filter(x => x.id !== d.id);
    save(ST);
    modal = null;
    viewingDropId = null;
    render();
  }}, 'Delete'));
  m.appendChild(actions);
  return backdrop;
}

function engagementModal() {
  const d = ST.drops.find(x => x.id === viewingDropId);
  if (!d) { modal = null; return h('div'); }
  const {backdrop, m} = modalShell('Log Engagement', d.title);

  const dateIn = h('input', {cls:'ipt mono-ipt', type:'date', value: d.posted_date || today()});
  m.append(h('label', {cls:'lbl'}, 'Posted Date'), dateIn);

  const likesIn = h('input', {cls:'ipt mono-ipt', type:'number', min:'0', value: d.likes || 0});
  const commentsIn = h('input', {cls:'ipt mono-ipt', type:'number', min:'0', value: d.comments || 0});
  const savesIn = h('input', {cls:'ipt mono-ipt', type:'number', min:'0', value: d.saves || 0});
  const salesIn = h('input', {cls:'ipt mono-ipt', type:'number', min:'0', value: d.sales || 0});

  m.append(h('label', {cls:'lbl'}, 'Engagement'));
  const grid = h('div', {cls:'engagement-grid'});
  [['Likes',likesIn],['Comments',commentsIn],['Saves',savesIn],['Sales',salesIn]].forEach(([lbl,ip])=>{
    const w = h('div', {cls:'engagement-input'});
    w.appendChild(h('label', {}, lbl));
    w.appendChild(ip);
    grid.appendChild(w);
  });
  m.appendChild(grid);

  const notesIn = h('textarea', {cls:'ipt', rows:'3', placeholder:'What worked. What didn\'t. What to do differently.'});
  notesIn.value = d.notes || '';
  m.append(h('label', {cls:'lbl'}, 'Notes'), notesIn);

  m.appendChild(h('button', {cls:'primary', click:()=>{
    ST.drops = ST.drops.map(x => x.id === d.id ? {
      ...x,
      status: 'posted',
      posted_date: dateIn.value,
      likes: parseInt(likesIn.value) || 0,
      comments: parseInt(commentsIn.value) || 0,
      saves: parseInt(savesIn.value) || 0,
      sales: parseInt(salesIn.value) || 0,
      notes: notesIn.value,
      updated: Date.now()
    } : x);
    save(ST);
    modal = 'detail';
    render();
  }}, 'Save'));
  return backdrop;
}

function dataModal() {
  const {backdrop, m} = modalShell('Library', 'DROPS · LOCAL');

  const stats = h('div', {style:'display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px'});
  const posted = ST.drops.filter(d => d.status === 'posted');
  const totalEngagement = ST.drops.reduce((a,d) => a + engagementTotal(d), 0);
  stats.appendChild(h('div', {style:'padding:14px;border:1px solid var(--line);border-radius:12px'},
    h('div', {style:'font-family:var(--mono);font-size:9px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px'}, 'Total Drops'),
    h('div', {style:'font-weight:500;font-size:26px'}, String(ST.drops.length))
  ));
  stats.appendChild(h('div', {style:'padding:14px;border:1px solid var(--line);border-radius:12px'},
    h('div', {style:'font-family:var(--mono);font-size:9px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px'}, 'Posted'),
    h('div', {style:'font-weight:500;font-size:26px'}, String(posted.length))
  ));
  m.appendChild(stats);

  // Top performers
  if (posted.length) {
    const sec = h('div', {cls:'detail-section'});
    sec.appendChild(h('h3', {}, 'Top Performers'));
    const top = [...posted].sort((a,b) => engagementTotal(b) - engagementTotal(a)).slice(0,3);
    const list = h('div', {cls:'drop-list'});
    top.forEach((d,i) => {
      const g = glyphById(d.glyph);
      const row = h('div', {cls:'drop-row', click:()=>{viewingDropId = d.id; modal='detail'; render();}});
      row.appendChild(h('div', {cls:'drop-row-head'},
        h('div', {cls:'drop-row-title'}, '#' + (i+1) + ' · ' + d.title),
        h('div', {cls:'drop-row-status posted'}, String(engagementTotal(d)) + ' score')
      ));
      row.appendChild(h('div', {cls:'drop-row-meta'},
        h('span', {}, h('strong', {}, g.name)),
        h('span', {}, (d.likes||0) + ' / ' + (d.comments||0) + ' / ' + (d.saves||0) + ' / ' + (d.sales||0))
      ));
      list.appendChild(row);
    });
    sec.appendChild(list);
    m.appendChild(sec);
  }

  // Import file input
  const fi = h('input', {type:'file', accept:'.json,application/json', style:'display:none'});
  fi.addEventListener('change', () => {
    const f = fi.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (!d.drops || !Array.isArray(d.drops)) throw 0;
        if (!confirm('Replace current drops with imported file?')) return;
        ST = {...ST, ...d};
        save(ST); modal=null; render();
        alert('Imported ' + d.drops.length + ' drops.');
      } catch(e) { alert('Could not read file.'); }
    };
    r.readAsText(f);
  });

  const da = h('div', {cls:'data-actions'});
  da.appendChild(h('button', {click:()=>{
    const blob = new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'drops-' + today() + '.json'; a.click();
    URL.revokeObjectURL(url);
  }}, '↓ Export JSON'));
  da.appendChild(h('button', {click:()=>{
    let csv = 'Title,Glyph,Product,Price,Week,Status,Posted Date,Likes,Comments,Saves,Sales,Score\n';
    ST.drops.forEach(d => {
      const g = glyphById(d.glyph);
      const row = [
        '"' + (d.title||'').replace(/"/g,'""') + '"',
        '"' + g.name + '"',
        d.product || '',
        d.price || '',
        d.week || '',
        d.status || '',
        d.posted_date || '',
        d.likes||0, d.comments||0, d.saves||0, d.sales||0,
        engagementTotal(d)
      ].join(',');
      csv += row + '\n';
    });
    const blob = new Blob([csv],{type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'drops-' + today() + '.csv'; a.click();
    URL.revokeObjectURL(url);
  }}, '↓ Export CSV'));
  da.appendChild(h('button', {click:()=>fi.click()}, '↑ Import JSON'));
  da.appendChild(fi);
  da.appendChild(h('button', {cls:'danger', click:()=>{
    if (!confirm('Reset all drops? This cannot be undone.')) return;
    if (!confirm('Are you absolutely sure?')) return;
    localStorage.removeItem(SK);
    ST = load(); modal=null; render();
  }}, 'Reset All Data'));
  m.appendChild(da);

  m.appendChild(h('p', {cls:'hint'}, 'Drops live on this device only. Export regularly to back up. The Sequencer schedules. The Builder generates. The Tracker measures. Three tools, one data layer.'));
  return backdrop;
}

render();
</script>

}
