@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0d0c0a;--bg-2:#15130f;--line:#2a2722;--fg:#f3eee2;--mute:#8a8378;--accent:#e23b3b;--display:'Bricolage Grotesque',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--display);overscroll-behavior:none}
body{min-height:100svh}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
input,select,textarea{font:inherit;color:inherit;background:none}
.app{display:flex;flex-direction:column;min-height:100svh;padding-top:env(safe-area-inset-top);padding-bottom:calc(56px + env(safe-area-inset-bottom));max-width:720px;margin:0 auto}
.head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 8px}
.brand{display:flex;align-items:baseline;gap:10px}
.mark{font-size:20px;color:var(--accent)}
.title{font-weight:800;letter-spacing:.04em;font-size:24px}
.count{font-family:var(--mono);font-size:11px;color:var(--mute);letter-spacing:.1em;padding:4px 8px;border:1px solid var(--line);border-radius:99px}
.menu-btn{width:40px;height:40px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px}
.menu-btn span{width:18px;height:2px;background:var(--fg);display:block}
.menu-btn span:nth-child(2){width:12px}
.glyph-rail{display:flex;gap:8px;padding:10px 18px 16px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.glyph-rail::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px 10px;border:1px solid var(--line);border-radius:14px;color:var(--mute);min-width:78px;scroll-snap-align:start;transition:.18s ease;background:transparent}
.chip.active{color:var(--fg);background:var(--bg-2);border-color:var(--fg)}
.chip-name{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;text-align:center;line-height:1.15;max-width:74px}
.chip.add{justify-content:center;color:var(--mute);border-style:dashed}
.chip.add .plus{font-size:22px;font-weight:300;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.stage{flex:1;display:flex;flex-direction:column;padding:0 22px 8px;gap:18px}
.glyph-display{display:flex;align-items:center;gap:18px;padding:6px 0 4px}
.meta{display:flex;flex-direction:column;gap:4px;min-width:0}
.meta-name{font-weight:800;font-size:28px;line-height:1;letter-spacing:-.01em}
.meta-meaning{font-family:var(--mono);font-size:11px;color:var(--mute);letter-spacing:.08em;text-transform:uppercase}
.meta-stat{font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:.1em;margin-top:4px}
.card{flex:1;border:1px solid var(--line);border-radius:22px;background:radial-gradient(circle at 20% 0%,#1b1812,var(--bg-2));padding:32px 26px;display:flex;align-items:center;justify-content:center;min-height:240px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;inset:14px;border:1px dashed var(--line);border-radius:14px;pointer-events:none}
.seed-text{font-family:var(--display);font-size:clamp(26px,7vw,42px);font-weight:700;line-height:1.1;letter-spacing:-.015em;text-align:center;margin:0;animation:rise .4s ease}
.seed-empty{font-family:var(--mono);color:var(--mute);text-align:center;font-size:13px}
.seed-empty em{color:var(--fg);font-style:normal}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.actions{display:flex;gap:10px;padding:6px 0 8px}
.actions.sub{padding:0 0 18px}
.pull{flex:1;background:var(--accent);color:#fff;border-radius:16px;padding:22px;font-size:22px;font-weight:800;letter-spacing:.06em;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 8px 0 #8a1f1f,0 22px 40px -10px rgba(226,59,59,.4);transition:transform .08s,box-shadow .08s}
.pull:active{transform:translateY(4px);box-shadow:0 4px 0 #8a1f1f}
.pull:disabled{background:#2a2722;color:var(--mute);box-shadow:none}
.dice{flex:0 0 auto;width:72px;min-height:70px;background:var(--bg-2);border:1px solid var(--line);color:var(--fg);border-radius:16px;display:flex;align-items:center;justify-content:center}
.ghost{border:1px solid var(--line);border-radius:16px;padding:18px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg);transition:.15s}
.ghost.block{display:block;width:100%;text-align:center;margin:8px 0}
.ghost.danger{color:var(--accent);border-color:var(--accent)}
.foot{display:flex;justify-content:space-between;align-items:center;padding:10px 22px 18px;font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase}
.link{color:var(--fg);text-decoration:underline;text-underline-offset:3px;background:none;border:0;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.modal{background:var(--bg-2);border-top:1px solid var(--line);border-radius:24px 24px 0 0;width:100%;max-width:720px;max-height:88svh;overflow-y:auto;padding:18px 22px;padding-bottom:calc(56px + env(safe-area-inset-bottom))}
@media(min-width:720px){.modal-backdrop{align-items:center}.modal{border-radius:24px;border:1px solid var(--line);max-height:80vh}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg-2);z-index:2}
.modal-head h2{margin:0;font-size:20px;font-weight:800;letter-spacing:-.01em}
.x{width:36px;height:36px;border:1px solid var(--line);border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--mute);cursor:pointer}
.x.sm{width:28px;height:28px;font-size:11px}
.lbl{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin:14px 0 6px}
.lbl:first-child{margin-top:0}
.ipt{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px;color:var(--fg);font-size:16px;line-height:1.4;outline:none;transition:.15s}
.ipt:focus{border-color:var(--fg)}
.ipt.mono-ipt{font-family:var(--mono);font-size:12px}
textarea.ipt{resize:vertical}
.primary{margin-top:16px;width:100%;background:var(--fg);color:var(--bg);border-radius:14px;padding:18px;font-weight:800;font-size:16px;border:0;cursor:pointer;font-family:var(--display)}
.preview{margin-top:14px;display:flex;align-items:center;gap:14px;padding:14px;border:1px dashed var(--line);border-radius:12px;display:none}
.small{font-size:10px;color:var(--mute)}
.glyph-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
.glyph-list li{display:flex;gap:6px;align-items:stretch}
.glyph-row{flex:1;display:flex;align-items:center;gap:14px;padding:12px;border:1px solid var(--line);border-radius:14px;text-align:left;color:var(--fg);cursor:pointer}
.glyph-row:hover{border-color:var(--fg)}
.grow{flex:1;display:flex;flex-direction:column;min-width:0}
.row-name{font-weight:700;font-size:16px}
.row-sub{font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:.08em;text-transform:uppercase}
.arrow{color:var(--mute);font-size:20px}
.data-actions{display:flex;flex-direction:column;gap:8px;margin-top:18px}
.data-actions .ghost{padding:14px;display:block;width:100%;text-align:left}
.hint{margin-top:18px;font-size:11px;color:var(--mute);line-height:1.5;font-family:var(--mono)}
.seed-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px}
.seed-list li{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;line-height:1.35}
.seed-list li.empty{color:var(--mute);justify-content:center;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.__pl-notch{
  position:fixed;top:0;left:0;right:0;
  height:env(safe-area-inset-top);
  background:#0a0908;
  border-bottom:1px solid rgba(201,168,76,.18);
  z-index:99998;
}
.__pl-back{
  position:fixed;bottom:0;left:0;right:0;z-index:99999;
  height:calc(44px + env(safe-area-inset-bottom));
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:10px;
  background:rgba(10,9,8,.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(201,168,76,.18);
  color:#f4ecd8;text-decoration:none;
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;font-size:14px;letter-spacing:.04em;
  cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
  gap:8px;
}
.__pl-back:active{background:rgba(20,18,14,.98)}
.__pl-back .__pl-arrow{font-family:system-ui;font-style:normal;color:#c9a84c;font-size:15px;line-height:1}
.__pl-back .__pl-dot{width:5px;height:5px;border-radius:99px;background:#c9a84c;margin-left:1px;display:inline-block;vertical-align:middle}

// ── helpers ──
function h(tag, props, ...kids) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(props||{})) {
    if (k==='cls') e.className=v;
    else if (k==='html') e.innerHTML=v;
    else if (typeof v==='function') e.addEventListener(k,v);
    else e.setAttribute(k,v);
  }
  for (const k of kids) {
    if (k==null) continue;
    e.append(typeof k==='string'?document.createTextNode(k):k);
  }
  return e;
}
function svgMark(inner,w,ht){
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('viewBox','0 0 200 200');
  s.setAttribute('width',w||64); s.setAttribute('height',ht||64);
  s.innerHTML=inner||''; return s;
}

// ── state ──
const SK='seeds-library-v1';
function buildDefaults(){
  return window.DEFAULT_GLYPHS.map(g=>({...g,svg:window.DEFAULT_GLYPH_SVGS[g.id]||''}));
}
function load(){
  const defs=buildDefaults();
  try{
    const raw=localStorage.getItem(SK);
    if(raw){
      const s=JSON.parse(raw);
      const have=new Set(s.glyphs.map(g=>g.id));
      const add=defs.filter(g=>!have.has(g.id));
      if(add.length) s.glyphs=[...add,...s.glyphs];
      s.glyphs=s.glyphs.map(g=>({...g,svg:g.svg||window.DEFAULT_GLYPH_SVGS[g.id]||''}));
      return s;
    }
  }catch(e){}
  return {glyphs:defs,activeId:defs[0].id};
}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch(e){}}
function slugify(s){return s.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'g-'+Date.now();}
function pick(arr,avoid){
  if(!arr.length)return null;
  if(arr.length===1)return arr[0];
  let p,t=0; do{p=arr[Math.floor(Math.random()*arr.length)];t++;}while(p===avoid&&t<20); return p;
}

let ST=load(), seed=null, modal=null, browseId=null;
function active(){return ST.glyphs.find(g=>g.id===ST.activeId)||ST.glyphs[0];}
function totalSeeds(){return ST.glyphs.reduce((a,g)=>a+g.seeds.length,0);}

// ── render ──
function render(){
  const root=document.getElementById('app');
  root.innerHTML='';
  root.appendChild(mainView());
  if(modal) root.appendChild(modalView());
}

function mainView(){
  const g=active();
  if(!seed&&g.seeds.length) seed=pick(g.seeds,null);

  const wrap=h('div',{cls:'app'});

    h('span',{}),h('span',{}),h('span',{}));

    h('div',{cls:'brand'},h('span',{cls:'mark'},'✶'),h('span',{cls:'title'},'SEEDS'),h('span',{cls:'count'},String(totalSeeds()))),
    menuBtn));

  // rail
  const rail=h('div',{cls:'glyph-rail'});
  ST.glyphs.forEach(glyph=>{
    const chip=h('button',{cls:'chip'+(glyph.id===ST.activeId?' active':''),
      click:()=>{ST.activeId=glyph.id;seed=pick(glyph.seeds,null);save(ST);render();}});
    chip.appendChild(svgMark(glyph.svg,36,36));
    chip.appendChild(h('span',{cls:'chip-name'},glyph.name));

  // stage

  const disp=h('div',{cls:'glyph-display'});
  disp.appendChild(svgMark(g.svg,140,140));

    h('div',{cls:'meta-stat'},g.seeds.length+' seeds')));
  stage.appendChild(disp);

  const card=h('div',{cls:'card'});
  if(seed){card.appendChild(h('p',{cls:'seed-text'},seed));}
  else{const p=h('p',{cls:'seed-empty'});p.innerHTML='No seeds yet. Tap <em>+ Add seeds</em> below.';card.appendChild(p);}
  stage.appendChild(card);

  // buttons
  const acts=h('div',{cls:'actions'});
  const pullBtn=h('button',{cls:'pull',click:doPull});
  if(!g.seeds.length) pullBtn.disabled=true;
  pullBtn.innerHTML='<span>PULL</span><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 3-6.7" stroke-linecap="round"/><path d="M3 4v5h5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  acts.appendChild(diceBtn);

  const sub=h('div',{cls:'actions sub'},h('button',{cls:'ghost',click:()=>{modal='upload';render();}},'+ Add seeds'));
  stage.appendChild(sub);

  wrap.appendChild(h('div',{cls:'foot'},h('span',{cls:'mono'},'localStorage · works offline'),h('button',{cls:'link',click:()=>{modal='data';render();}},'data')));
  return wrap;
}

function doPull(){
  const g=active(); if(!g.seeds.length)return;
  document.querySelector('.card')?.classList.add('pulling');
  setTimeout(()=>{seed=pick(g.seeds,seed);render();},160);
}
function doPullAny(){
  const pool=[];
  ST.glyphs.forEach(g=>g.seeds.forEach(s=>pool.push({s,gid:g.id})));
  if(!pool.length)return;
  document.querySelector('.card')?.classList.add('pulling');
  setTimeout(()=>{const p=pool[Math.floor(Math.random()*pool.length)];seed=p.s;ST.activeId=p.gid;render();},160);
}

// ── modals ──
function modalShell(title){
  const backdrop=h('div',{cls:'modal-backdrop'});
  backdrop.addEventListener('click',e=>{if(e.target===backdrop){modal=null;browseId=null;render();}});
  const m=h('div',{cls:'modal'});
  m.appendChild(h('div',{cls:'modal-head'},
    h('h2',{},title),
    h('button',{cls:'x',click:()=>{modal=null;browseId=null;render();}},'✕')));
  backdrop.appendChild(m);
  return {backdrop,m};
}

function modalView(){
  if(modal==='upload') return uploadModal();
  if(modal==='glyph') return addGlyphModal();
  if(modal==='data') return dataModal();
}

function uploadModal(){
  const {backdrop,m}=modalShell('Add seeds');
  const sel=h('select',{cls:'ipt'});
  ST.glyphs.forEach(g=>{const o=h('option',{value:g.id},g.name);if(g.id===ST.activeId)o.selected=true;sel.appendChild(o);});
  const ta=h('textarea',{cls:'ipt',rows:'8',placeholder:'Stack the small wins.\nBreak the cycle.\nThe bag is already yours.'});
  const fi=h('input',{type:'file',accept:'.txt,.md,.csv',style:'display:none'});
  fi.addEventListener('change',()=>{const f=fi.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{ta.value=(ta.value?ta.value+'\n':'')+r.result;};r.readAsText(f);});
  const fileLbl=h('label',{cls:'lbl'},fi,h('span',{cls:'ghost block'},'↑ Upload .txt file'));
  const btn=h('button',{cls:'primary',click:()=>{
    const lines=ta.value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    if(!lines.length){alert('Paste at least one line.');return;}
    const gid=sel.value;
    ST.glyphs=ST.glyphs.map(g=>g.id===gid?{...g,seeds:[...g.seeds,...lines]}:g);
    save(ST);modal=null;render();
  }},'Add seeds');
  m.append(h('label',{cls:'lbl'},'Glyph'),sel,h('label',{cls:'lbl'},'Paste — one per line'),ta,fileLbl,btn);
  return backdrop;
}

function addGlyphModal(){
  const {backdrop,m}=modalShell('New glyph');
  let svgC='';
  const ni=h('input',{cls:'ipt',placeholder:'e.g. Stay Solid'});
  const mi=h('input',{cls:'ipt',placeholder:"e.g. Don't fold under pressure"});
  const svgTa=h('textarea',{cls:'ipt mono-ipt',rows:'5',placeholder:'<circle cx="100" cy="100" r="60" .../>'});
  const prev=h('div',{cls:'preview'});
  const psvg=svgMark('',120,120);
  prev.append(psvg,h('div',{cls:'small'},'preview'));
  svgTa.addEventListener('input',()=>{
    svgC=svgTa.value;
    if(svgC.trim()){psvg.innerHTML=svgC;prev.style.display='flex';}
    else prev.style.display='none';
  });
  const fi=h('input',{type:'file',accept:'.svg,image/svg+xml',style:'display:none'});
  fi.addEventListener('change',()=>{const f=fi.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{let s=r.result;const mm=s.match(/<svg[^>]*>([\s\S]*?)<\/svg>/i);if(mm)s=mm[1];svgC=s;svgTa.value=s;psvg.innerHTML=s;prev.style.display='flex';};r.readAsText(f);});
  const fileLbl=h('label',{cls:'lbl'},fi,h('span',{cls:'ghost block'},'↑ Upload .svg file'));
  const btn=h('button',{cls:'primary',click:()=>{
    const name=ni.value.trim();if(!name){alert('Name the glyph.');return;}
    const base=slugify(name);let id=base,n=1;
    while(ST.glyphs.find(g=>g.id===id))id=base+'-'+(++n);
    const fs=svgC.trim()||`<text x="100" y="115" text-anchor="middle" font-family="Helvetica,sans-serif" font-weight="900" font-size="72" fill="currentColor">${(name[0]||'?').toUpperCase()}</text>`;
    ST.glyphs=[...ST.glyphs,{id,name,meaning:mi.value.trim(),svg:fs,seeds:[]}];
    ST.activeId=id;seed=null;save(ST);modal=null;render();
  }},'Create glyph');
  m.append(h('label',{cls:'lbl'},'Name'),ni,h('label',{cls:'lbl'},'Meaning'),mi,h('label',{cls:'lbl'},'Glyph SVG'),svgTa,fileLbl,prev,btn);
  return backdrop;
}

    const r=new FileReader();r.onload=()=>{
      try{const d=JSON.parse(r.result);if(!d.glyphs||!Array.isArray(d.glyphs))throw 0;
        ST={glyphs:d.glyphs,activeId:d.activeId||d.glyphs[0].id};seed=null;save(ST);modal=null;render();alert('Imported '+d.glyphs.length+' glyphs.');}
      catch(e){alert('Could not read file.');}
    };r.readAsText(f);
  });

  const da=h('div',{cls:'data-actions'});
  da.appendChild(h('button',{cls:'ghost',click:()=>{
    const blob=new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='seeds-library.json';a.click();URL.revokeObjectURL(url);
  }},'↓ Export JSON'));
  da.appendChild(h('button',{cls:'ghost',click:()=>fi.click()},'↑ Import JSON'));
  da.appendChild(fi);
  da.appendChild(h('button',{cls:'ghost danger',click:()=>{
    if(!confirm('Reset to defaults? All custom seeds erased.'))return;
    localStorage.removeItem(SK);ST=load();seed=null;modal=null;render();
  }},'Reset to defaults'));
  m.append(ul,da,h('p',{cls:'hint'},'Library lives on this device. Export to back up or share.'));
  return backdrop;
}

render();

</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
